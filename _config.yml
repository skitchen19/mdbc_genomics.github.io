# Name and description of site.
# Used in _layouts/default.html.
#  - The first is also used in metadata, and so cannot include markup.
#
# URL is used in "Sitemap.xml" and RSS feed.
#
name:        MDBC Genomic Resources
description: Genomic and transcriptomic data generated by NOAA Mesophotic and Deep Benthic Communities projects.
url:         https://mdbc_genomics.github.io

footer-links:
  github: mdbc_genomics.github.io
  social media: 
  email:

source:           .
destination:      ./_site

plugins_dir:      _plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

layouts_dir:      _layouts
data_dir:         _data
includes_dir:     _includes

sass:
  sass_dir:       _sass
  style:          :expanded     # You might prefer to minify using :compressed

#  Don't include this crud in the _site.
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - vendor
  - vendor/bundle
  - README.md
  - README.txt
  - CNAME
  - _layouts/.#genomeark.html

#
kramdown:
  input: GFM
  syntax_highlighter: rouge

#  syntax_highlighter_opts:
#    css_class: 'highlight'

# Markdown Processors (from defaults page)
#kramdown:
#  auto_ids          : true
#  entity_output     : as_char
#  toc_levels        : [1, 2, 3, 4, 5, 6]
#  smart_quotes      : lsquo,rsquo,ldquo,rdquo
#  input             : GFM
#  hard_wrap         : false
#  footnote_nr       : 1
#  show_warnings     : false

#
#  MDBC pages

collections:
  mdbc-all:
    output: true
  assemblies:
    output: true
  raw-data:
    output: true

 
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

  - scope:
      path: "_mdbc-all"
    values:
      layout: mdbc
      use_name_for_title: true
  - scope:
      path: "_assemblies"
    values:
      layout: mdbc
      use_name_for_title: true
  - scope:
      path: "_raw-data"
    values:
      layout: mdbc
      use_name_for_title: true